<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8">
<title>Math Calculator</title>

<link rel="stylesheet" href="index.css">

<script src="https://cdn.jsdelivr.net/npm/function-plot/dist/function-plot.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.11.0/math.min.js"></script>

<style>

.dark{
background:#121212;
color:white;
}

.dark #content{
background:#1e1e1e;
}

.dark #menu{
background:#0d1b2a;
}

.dark button{
background:#1e1e1e;
color:white;
border:1px solid #444;
}

.dark input{
background:#1e1e1e;
color:white;
border:1px solid #444;
}

table{
margin-top:20px;
border-collapse:collapse;
}

td,th{
padding:6px 10px;
border:1px solid #aaa;
}

</style>

</head>

<body>

<div id="hamburger" onclick="toggleMenu()">☰</div>

<div id="menu">

<h3>Menü</h3>

<button onclick="toggleFunctions()">Fonksiyonlar ▼</button>

<div id="functionsMenu" style="display:none">

<button onclick="setMode('function')">Fonksiyon Grafiği</button>

<button onclick="setMode('table')">Fonksiyon Tablosu</button>

<button onclick="setMode('point')">Nokta Ekle</button>

<button onclick="setMode('distance')">İki Nokta Mesafe</button>

</div>

<button onclick="setMode('derivative')">Türev Grafiği</button>

<button onclick="setMode('integral')">İntegral Alanı</button>

<button onclick="setMode('tangent')">Teğet Doğrusu</button>

<button onclick="setMode('limit')">Limit Grafiği</button>

<button onclick="toggleDark()">🌙 Dark Mode</button>

</div>

<div id="content">

<h2 id="title">Fonksiyon Grafiği</h2>

<input id="func" value="x^2">

<input id="a" type="number" placeholder="a" style="display:none">
<input id="b" type="number" placeholder="b" style="display:none">
<input id="x0" type="number" placeholder="x noktası" style="display:none">

<input id="x1" type="number" placeholder="x1" style="display:none">
<input id="y1" type="number" placeholder="y1" style="display:none">
<input id="x2" type="number" placeholder="x2" style="display:none">
<input id="y2" type="number" placeholder="y2" style="display:none">

<button onclick="draw()">Grafiği Çiz</button>
<button onclick="downloadPNG()">PNG indir</button>

<div id="plot"></div>

<div id="table"></div>

<hr style="margin:40px 0">

<h2>AI Matematik Asistanı</h2>

<input id="aiInput" placeholder="Matematik sorusu yaz">
<button onclick="askAI()">Sor</button>

<div id="aiAnswer" style="margin-top:20px"></div>

</div>

<script>

const API_KEY="AIzaSyAZocNHOfHLnIctWWsDmehkTgIlzxXipkY";

let mode="function";

function toggleMenu(){

let m=document.getElementById("menu");

m.style.display = m.style.display==="block" ? "none":"block";

}

function toggleFunctions(){

let m=document.getElementById("functionsMenu");

m.style.display = m.style.display==="block" ? "none":"block";

}

function toggleDark(){

document.body.classList.toggle("dark");

}

function setMode(m){

mode=m;

toggleMenu();

document.getElementById("a").style.display="none";
document.getElementById("b").style.display="none";
document.getElementById("x0").style.display="none";
document.getElementById("x1").style.display="none";
document.getElementById("y1").style.display="none";
document.getElementById("x2").style.display="none";
document.getElementById("y2").style.display="none";

document.getElementById("table").innerHTML="";

if(mode==="function"){
title.innerText="Fonksiyon Grafiği";
}

if(mode==="table"){
title.innerText="Fonksiyon Tablosu";
}

if(mode==="point"){
title.innerText="Nokta Ekle";
x1.style.display="inline";
y1.style.display="inline";
}

if(mode==="distance"){
title.innerText="İki Nokta Mesafe";
x1.style.display="inline";
y1.style.display="inline";
x2.style.display="inline";
y2.style.display="inline";
}

if(mode==="derivative"){
title.innerText="Türev Grafiği";
}

if(mode==="integral"){
title.innerText="İntegral Alanı";
a.style.display="inline";
b.style.display="inline";
}

if(mode==="tangent"){
title.innerText="Teğet Doğrusu";
x0.style.display="inline";
}

if(mode==="limit"){
title.innerText="Limit Grafiği";
x0.style.display="inline";
}

draw();

}

function draw(){

plot.innerHTML="";

let f=func.value;

let width=content.offsetWidth-120;

try{

if(mode==="function"){

functionPlot({
target:"#plot",
width:width,
height:400,
grid:true,
data:[
{fn:f}
]
});

}

if(mode==="derivative"){

let d=math.derivative(f,"x").toString();

functionPlot({
target:"#plot",
width:width,
height:400,
grid:true,
data:[
{fn:f},
{fn:d}
]
});

}

if(mode==="integral"){

let A=parseFloat(a.value);
let B=parseFloat(b.value);

functionPlot({
target:"#plot",
width:width,
height:400,
grid:true,
data:[
{fn:f,color:"black"},
{fn:f,range:[A,B],closed:true,color:"skyblue"}
]
});

}

if(mode==="tangent"){

let X=parseFloat(x0.value);

let y=math.evaluate(f,{x:X});
let d=math.derivative(f,"x").toString();
let slope=math.evaluate(d,{x:X});

let t=`${slope}*(x-${X})+${y}`;

functionPlot({
target:"#plot",
width:width,
height:400,
grid:true,
data:[
{fn:f},
{fn:t},
{points:[[X,y]],fnType:"points"}
]
});

}

if(mode==="limit"){

let X=parseFloat(x0.value);

functionPlot({
target:"#plot",
width:width,
height:400,
grid:true,
data:[
{fn:f},
{fn:`${X}`,range:[-10,10]}
]
});

}

if(mode==="point"){

let X=parseFloat(x1.value);
let Y=parseFloat(y1.value);

functionPlot({
target:"#plot",
width:width,
height:400,
grid:true,
data:[
{points:[[X,Y]],fnType:"points"}
]
});

}

if(mode==="distance"){

let X1=parseFloat(x1.value);
let Y1=parseFloat(y1.value);
let X2=parseFloat(x2.value);
let Y2=parseFloat(y2.value);

let d=Math.sqrt((X2-X1)**2+(Y2-Y1)**2);

table.innerHTML="Mesafe = "+d;

functionPlot({
target:"#plot",
width:width,
height:400,
grid:true,
data:[
{points:[[X1,Y1],[X2,Y2]],fnType:"points"}
]
});

}

if(mode==="table"){

let html="<table><tr><th>x</th><th>f(x)</th></tr>";

for(let i=-5;i<=5;i++){

let y=math.evaluate(f,{x:i});

html+=`<tr><td>${i}</td><td>${y}</td></tr>`;

}

html+="</table>";

table.innerHTML=html;

}

}catch(e){

console.log(e);

}

}

function downloadPNG(){

let svg=document.querySelector("#plot svg");

let serializer=new XMLSerializer();
let source=serializer.serializeToString(svg);

let img=new Image();

img.src="data:image/svg+xml;base64,"+btoa(source);

let canvas=document.createElement("canvas");

canvas.width=800;
canvas.height=500;

let ctx=canvas.getContext("2d");

img.onload=function(){

ctx.drawImage(img,0,0);

let a=document.createElement("a");

a.download="graph.png";

a.href=canvas.toDataURL("image/png");

a.click();

}

}

async function askAI(){

let q=aiInput.value;

aiAnswer.innerText="AI düşünüyor...";

try{

let response=await fetch(
"https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key="+API_KEY,
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
contents:[
{
parts:[
{
text:"Bir matematik öğretmeni gibi adım adım çöz ve neden yaptığını açıkla: "+q
}
]
}
]
})
});

let data=await response.json();

if(data.candidates){

aiAnswer.innerText=data.candidates[0].content.parts[0].text;

}else{

aiAnswer.innerText="AI cevap veremedi.";

}

}catch(e){

aiAnswer.innerText="Bağlantı hatası.";

}

}

window.onload=draw;

</script>

</body>
</html>
