<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8">
<title>Math Graph</title>

<script src="https://cdn.jsdelivr.net/npm/function-plot/dist/function-plot.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.11.0/math.min.js"></script>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f6f9;
}

#hamburger{
font-size:28px;
position:fixed;
top:10px;
left:10px;
cursor:pointer;
background:white;
padding:8px 12px;
border-radius:6px;
}

#menu{
position:fixed;
left:0;
top:0;
width:220px;
height:100%;
background:white;
padding:20px;
display:none;
box-shadow:2px 0 10px rgba(0,0,0,0.2);
}

.submenu{
display:none;
margin-left:10px;
}

button{
padding:8px 12px;
margin:4px;
border:none;
background:#2d6cdf;
color:white;
border-radius:6px;
cursor:pointer;
}

#content{
margin-left:80px;
padding:30px;
}

#plot{
background:white;
border-radius:10px;
padding:20px;
}

#pngBtn{
margin-top:10px;
float:right;
}

.dark{
background:#121212;
color:white;
}

.dark #menu{
background:#1e1e1e;
}

.dark #plot{
background:#1e1e1e;
}

table{
margin-top:20px;
border-collapse:collapse;
}

td,th{
border:1px solid gray;
padding:6px;
}

</style>

</head>

<body>

<div id="hamburger" onclick="toggleMenu()">☰</div>

<div id="menu">

<h3>Menü</h3>

<button onclick="toggleFunctions()">Fonksiyonlar ▼</button>

<div id="functionMenu" class="submenu">

<button onclick="setMode('function')">Fonksiyon Grafiği</button>
<button onclick="setMode('derivative')">Türev</button>
<button onclick="setMode('integral')">İntegral</button>
<button onclick="setMode('tangent')">Teğet</button>
<button onclick="setMode('limit')">Limit</button>

<button onclick="createTable()">Fonksiyon Tablosu</button>
<button onclick="calculateDistance()">İki Nokta Mesafe</button>

</div>

<button onclick="toggleDark()">Dark Mode</button>

</div>

<div id="content">

<h2 id="title">Fonksiyon Grafiği</h2>

<input id="func" value="x^2">

<input id="a" placeholder="a" type="number" style="display:none">
<input id="b" placeholder="b" type="number" style="display:none">
<input id="x0" placeholder="x noktası" type="number" style="display:none">

<button onclick="draw()">Grafiği Çiz</button>

<div id="plot"></div>

<button id="pngBtn" onclick="downloadPNG()">PNG indir</button>

<div id="distanceResult"></div>

<div id="table"></div>

</div>

<script>

let mode="function"
let points=[]

function toggleMenu(){

let m=document.getElementById("menu")

m.style.display = m.style.display==="block" ? "none":"block"

}

function toggleFunctions(){

let s=document.getElementById("functionMenu")

s.style.display = s.style.display==="block" ? "none":"block"

}

function toggleDark(){

document.body.classList.toggle("dark")

}

function setMode(m){

mode=m

a.style.display="none"
b.style.display="none"
x0.style.display="none"

if(mode==="function") title.innerText="Fonksiyon Grafiği"

if(mode==="derivative") title.innerText="Türev Grafiği"

if(mode==="integral"){

title.innerText="İntegral Alanı"

a.style.display="inline"
b.style.display="inline"

}

if(mode==="tangent"){

title.innerText="Teğet Doğrusu"

x0.style.display="inline"

}

if(mode==="limit"){

title.innerText="Limit"

x0.style.display="inline"

}

}

function draw(){

document.getElementById("plot").innerHTML=""

let f=func.value

let width=900

try{

if(mode==="function"){

functionPlot({
target:"#plot",
width:width,
height:400,
grid:true,
data:[{fn:f}]
})

}

if(mode==="derivative"){

let d=math.derivative(f,"x").toString()

functionPlot({
target:"#plot",
width:width,
height:400,
grid:true,
data:[{fn:d}]
})

}

if(mode==="integral"){

let A=parseFloat(a.value)
let B=parseFloat(b.value)

functionPlot({
target:"#plot",
width:width,
height:400,
grid:true,
data:[
{fn:f},
{fn:f,range:[A,B],closed:true,color:"skyblue"}
]
})

}

if(mode==="tangent"){

let X=parseFloat(x0.value)

let f0=math.evaluate(f,{x:X})
let d=math.derivative(f,"x").toString()
let slope=math.evaluate(d,{x:X})

let t=`${slope}*(x-${X})+${f0}`

functionPlot({
target:"#plot",
width:width,
height:400,
grid:true,
data:[
{fn:f},
{fn:t,color:"red"},
{points:[[X,f0]],fnType:"points"}
]
})

}

if(mode==="limit"){

let X=parseFloat(x0.value)

functionPlot({
target:"#plot",
width:width,
height:400,
grid:true,
data:[
{fn:f},
{fn:`${X}`,range:[-10,10],color:"red"}
]
})

}

setTimeout(enablePointClick,200)

}catch(e){
console.log(e)
}

}

function enablePointClick(){

let svg=document.querySelector("#plot svg")

if(!svg)return

svg.onclick=function(e){

let rect=svg.getBoundingClientRect()

let x=(e.clientX-rect.left)/rect.width*20-10
let y=10-(e.clientY-rect.top)/rect.height*20

points.push({x,y})

let circle=document.createElementNS("http://www.w3.org/2000/svg","circle")

circle.setAttribute("cx",e.clientX-rect.left)
circle.setAttribute("cy",e.clientY-rect.top)
circle.setAttribute("r",5)
circle.setAttribute("fill","red")

svg.appendChild(circle)

}

}

function calculateDistance(){

if(points.length<2){

distanceResult.innerText="Grafikte iki nokta seç"

return

}

let p1=points[points.length-1]
let p2=points[points.length-2]

let d=Math.sqrt((p1.x-p2.x)**2+(p1.y-p2.y)**2)

distanceResult.innerText="Mesafe = "+d.toFixed(4)

}

function createTable(){

let f=func.value

let table="<table><tr><th>x</th><th>f(x)</th></tr>"

for(let x=-5;x<=5;x++){

let y

try{
y=math.evaluate(f,{x:x})
}catch{
y="err"
}

table+=`<tr><td>${x}</td><td>${y}</td></tr>`

}

table+="</table>"

document.getElementById("table").innerHTML=table

}

function downloadPNG(){

let svg=document.querySelector("#plot svg")

let serializer=new XMLSerializer()

let source=serializer.serializeToString(svg)

let img=new Image()

let canvas=document.createElement("canvas")

canvas.width=900
canvas.height=400

let ctx=canvas.getContext("2d")

img.onload=function(){

ctx.drawImage(img,0,0)

let a=document.createElement("a")

a.download="grafik.png"

a.href=canvas.toDataURL()

a.click()

}

img.src="data:image/svg+xml;base64,"+btoa(source)

}

window.onload=draw

</script>

</body>
</html>
