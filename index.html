<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8">
<title>Math Calculator</title>

<link rel="stylesheet" href="index.css">

<script src="https://cdn.jsdelivr.net/npm/function-plot/dist/function-plot.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.11.0/math.min.js"></script>

<style>

.dark{
background:#121212;
color:white;
}

.dark #content{
background:#1e1e1e;
}

.dark #menu{
background:#0d1b2a;
}

.dark button{
background:#1e1e1e;
color:white;
border:1px solid #444;
}

.dark input{
background:#1e1e1e;
color:white;
border:1px solid #444;
}

</style>

</head>

<body>

<div id="hamburger" onclick="toggleMenu()">☰</div>

<div id="menu">

<h3>Menü</h3>

<button onclick="toggleFunctions()">Fonksiyonlar ▼</button>

<div id="functionsMenu" class="submenu">

<button onclick="setMode('function')">Fonksiyon Grafiği</button>

<button onclick="setMode('derivative')">Türev Grafiği</button>

<button onclick="setMode('integral')">İntegral Alanı</button>

<button onclick="setMode('tangent')">Teğet Doğrusu</button>

<button onclick="setMode('limit')">Limit Grafiği</button>

</div>

<button onclick="toggleDark()">🌙 Dark Mode</button>

</div>

<div id="content">

<h2 id="title">Fonksiyon Grafiği</h2>

<input id="func" value="x^2">

<input id="a" type="number" placeholder="a" style="display:none">
<input id="b" type="number" placeholder="b" style="display:none">
<input id="x0" type="number" placeholder="x noktası" style="display:none">

<button onclick="draw()">Grafiği Çiz</button>

<div id="plot"></div>

</div>

<script>

let mode="function";

function toggleMenu(){
let m=document.getElementById("menu");
m.style.display = m.style.display==="block" ? "none" : "block";
}

function toggleFunctions(){

let m=document.getElementById("functionsMenu");
m.style.display = m.style.display==="block" ? "none" : "block";

}

function toggleDark(){
document.body.classList.toggle("dark");
}

function setMode(m){

mode=m;

toggleMenu();

document.getElementById("a").style.display="none";
document.getElementById("b").style.display="none";
document.getElementById("x0").style.display="none";

if(mode==="function"){
document.getElementById("title").innerText="Fonksiyon Grafiği";
}

if(mode==="derivative"){
document.getElementById("title").innerText="Türev Grafiği";
}

if(mode==="integral"){
document.getElementById("title").innerText="İntegral Alanı";
document.getElementById("a").style.display="inline";
document.getElementById("b").style.display="inline";
}

if(mode==="tangent"){
document.getElementById("title").innerText="Teğet Doğrusu";
document.getElementById("x0").style.display="inline";
}

if(mode==="limit"){
document.getElementById("title").innerText="Limit Grafiği";
document.getElementById("x0").style.display="inline";
}

draw();

}

function draw(){

document.getElementById("plot").innerHTML="";

let f=document.getElementById("func").value;

let width=document.getElementById("content").offsetWidth-120;

try{

if(mode==="function"){

functionPlot({
target:"#plot",
width:width,
height:400,
grid:true,
data:[
{fn:f}
]
});

}

if(mode==="derivative"){

let d=math.derivative(f,"x").toString();

functionPlot({
target:"#plot",
width:width,
height:400,
grid:true,
data:[
{fn:d}
]
});

}

if(mode==="integral"){

let a=parseFloat(document.getElementById("a").value);
let b=parseFloat(document.getElementById("b").value);

functionPlot({

target:"#plot",
width:width,
height:400,
grid:true,

data:[
{fn:f,color:"black"},
{fn:f,range:[a,b],closed:true,color:"skyblue"}
]

});

}

if(mode==="tangent"){

let x0=parseFloat(document.getElementById("x0").value);

let f0=math.evaluate(f,{x:x0});
let d=math.derivative(f,"x").toString();
let slope=math.evaluate(d,{x:x0});

let tangent=`${slope}*(x-${x0})+${f0}`;

functionPlot({

target:"#plot",
width:width,
height:400,
grid:true,

data:[
{fn:f,color:"black"},
{fn:tangent,color:"red"},
{points:[[x0,f0]],fnType:"points",color:"red"}
]

});

}

if(mode==="limit"){

let x0=parseFloat(document.getElementById("x0").value);

functionPlot({

target:"#plot",
width:width,
height:400,
grid:true,

data:[
{fn:f,color:"black"},
{fn:`${x0}`,range:[-10,10],color:"red"}
]

});

}

}catch(e){
console.log(e);
}

}

window.onload=draw;

</script>

</body>
</html>
