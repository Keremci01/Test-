<!DOCTYPE html>

<html>
<head>

<meta charset="utf-8">
<title>Math Calculator</title>

<link rel="stylesheet" href="index.css">

<script src="https://cdn.jsdelivr.net/npm/function-plot/dist/function-plot.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.11.0/math.min.js"></script>

<style>

.dark{
background:#121212;
color:white;
}

.dark #menu{
background:#0d1b2a;
}

.dark button{
background:#1e1e1e;
color:white;
border:1px solid #444;
}

.dark input{
background:#1e1e1e;
color:white;
border:1px solid #444;
}

</style>

</head>

<body>

<div id="hamburger" onclick="toggleMenu()">☰</div>

<div id="menu">

<h3>Menü</h3>

<button onclick="toggleGroup('funcGroup')">Fonksiyonlar ▼</button>

<div id="funcGroup" style="display:none">

<button onclick="setMode('function')">Fonksiyon Grafiği</button>
<button onclick="setMode('multi')">Çoklu Fonksiyon Çiz</button>
<button onclick="setMode('distance')">İki Nokta Mesafe</button>

</div>

<button onclick="toggleGroup('analysisGroup')">Analiz ▼</button>

<div id="analysisGroup" style="display:none">

<button onclick="setMode('derivative')">Türev</button>
<button onclick="setMode('integral')">İntegral</button>
<button onclick="setMode('tangent')">Teğet</button>
<button onclick="setMode('limit')">Limit</button>

</div>

<button onclick="setMode('calculator')">🧮 Hesap Makinesi</button>

<button onclick="toggleDark()">🌙 Dark Mode</button>

</div>

<div id="content">

<h2 id="title">Fonksiyon Grafiği</h2>

<input id="func" placeholder="x^2">

<input id="func2" placeholder="ikinci fonksiyon" style="display:none">
<input id="func3" placeholder="üçüncü fonksiyon" style="display:none">

<input id="a" type="number" placeholder="a" style="display:none">
<input id="b" type="number" placeholder="b" style="display:none">

<input id="x0" type="number" placeholder="x noktası" style="display:none">

<input id="x1" type="number" placeholder="x1" style="display:none">
<input id="y1" type="number" placeholder="y1" style="display:none">
<input id="x2" type="number" placeholder="x2" style="display:none">
<input id="y2" type="number" placeholder="y2" style="display:none">

<br><br>

<div id="graphButtons">
<button onclick="draw()">Grafiği Çiz</button>
<button onclick="downloadPNG()">PNG indir</button>
</div>

<div id="plot"></div>
<div id="result"></div>

<div id="calculator" style="display:none; max-width:260px; margin-top:20px;">

<input id="calcDisplay" style="width:100%;padding:10px;font-size:20px;margin-bottom:10px;" placeholder="0">

<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;">

<button onclick="calc('7')">7</button>
<button onclick="calc('8')">8</button>
<button onclick="calc('9')">9</button>
<button onclick="calc('/')">÷</button>

<button onclick="calc('4')">4</button>
<button onclick="calc('5')">5</button>
<button onclick="calc('6')">6</button>
<button onclick="calc('*')">×</button>

<button onclick="calc('1')">1</button>
<button onclick="calc('2')">2</button>
<button onclick="calc('3')">3</button>
<button onclick="calc('-')">−</button>

<button onclick="calc('0')">0</button>
<button onclick="calc('.')">.</button>
<button onclick="calculate()">=</button>
<button onclick="calc('+')">+</button>

<button onclick="clearCalc()">C</button>

</div>

</div>

</div>

<script>

let mode="function"

function toggleMenu(){
let m=document.getElementById("menu")
m.style.display = m.style.display==="block" ? "none":"block"
}

function toggleGroup(id){
let g=document.getElementById(id)
g.style.display = g.style.display==="block" ? "none":"block"
}

function toggleDark(){
document.body.classList.toggle("dark")
}

function hideInputs(){

func2.style.display="none"
func3.style.display="none"

a.style.display="none"
b.style.display="none"

x0.style.display="none"

x1.style.display="none"
y1.style.display="none"
x2.style.display="none"
y2.style.display="none"

}

function clearInputs(){

func2.value=""
func3.value=""

a.value=""
b.value=""

x0.value=""

x1.value=""
y1.value=""
x2.value=""
y2.value=""

}

function setMode(m){

mode=m

func.style.display="inline"

hideInputs()
clearInputs()

plot.innerHTML=""
result.innerHTML=""

document.getElementById("calculator").style.display="none"
document.getElementById("graphButtons").style.display="block"
document.getElementById("plot").style.display="block"

if(m==="function"){
title.innerText="Fonksiyon Grafiği"
}

if(m==="multi"){

title.innerText="Çoklu Fonksiyon"

func2.style.display="inline"
func3.style.display="inline"

}

if(m==="distance"){

title.innerText="İki Nokta Mesafe"

x1.style.display="inline"
y1.style.display="inline"

x2.style.display="inline"
y2.style.display="inline"

}

if(m==="derivative"){
title.innerText="Türev Grafiği"
}

if(m==="integral"){

title.innerText="İntegral Alanı"

a.style.display="inline"
b.style.display="inline"

}

if(m==="tangent"){

title.innerText="Teğet"

x0.style.display="inline"

}

if(m==="limit"){

title.innerText="Limit"

x0.style.display="inline"

}

if(m==="calculator"){

title.innerText="Hesap Makinesi"

document.getElementById("calculator").style.display="block"
document.getElementById("graphButtons").style.display="none"
document.getElementById("plot").style.display="none"

func.style.display="none"

return

}

}

function draw(){

plot.innerHTML=""
result.innerHTML=""

let width=document.getElementById("plot").offsetWidth
let f=func.value

try{

if(mode==="function"){

functionPlot({
target:"#plot",
width:width,
height:400,
grid:true,
data:[{fn:f}]
})

}

if(mode==="multi"){

let data=[{fn:f}]

if(func2.value!="") data.push({fn:func2.value})
if(func3.value!="") data.push({fn:func3.value})

functionPlot({
target:"#plot",
width:width,
height:400,
grid:true,
data:data
})

}

if(mode==="derivative"){

let d=math.derivative(f,"x").toString()

result.innerHTML="f'(x) = "+d

functionPlot({
target:"#plot",
width:width,
height:400,
grid:true,
data:[
{fn:f},
{fn:d}
]
})

}

if(mode==="integral"){

let aVal=Number(a.value)
let bVal=Number(b.value)

functionPlot({

target:"#plot",
width:width,
height:400,
grid:true,

data:[

{fn:f},

{
fn:f,
range:[aVal,bVal],
closed:true,
color:"rgba(0,120,255,0.3)"
},

{fn:"x="+aVal,color:"red"},
{fn:"x="+bVal,color:"red"},

{
points:[
[aVal,math.evaluate(f,{x:aVal})],
[bVal,math.evaluate(f,{x:bVal})]
],
fnType:"points",
graphType:"scatter"
}

]

})

}

if(mode==="tangent"){

let x=Number(x0.value)

let d=math.derivative(f,"x")

let slope=d.evaluate({x:x})

let y=math.evaluate(f,{x:x})

let tangent=slope+"*(x-"+x+")+"+y

result.innerHTML="Teğet: "+tangent

functionPlot({
target:"#plot",
width:width,
height:400,
grid:true,
data:[
{fn:f},
{fn:tangent}
]
})

}

if(mode==="limit"){

let x=Number(x0.value)

let f1=math.evaluate(f,{x:x+0.00001})
let f2=math.evaluate(f,{x:x-0.00001})

let lim=(f1+f2)/2

result.innerHTML="Limit ≈ "+lim

}

if(mode==="distance"){

let x1v=Number(x1.value)
let y1v=Number(y1.value)
let x2v=Number(x2.value)
let y2v=Number(y2.value)

// boş kontrol
if(isNaN(x1v)||isNaN(y1v)||isNaN(x2v)||isNaN(y2v)){
result.innerHTML="Tüm değerleri gir kanka"
return
}

  let d=Math.sqrt((x2v-x1v)**2+(y2v-y1v)**2)
result.innerHTML="Mesafe = "+d.toFixed(2)

// 🔥 axis ayarı (en kritik)
let minX=Math.min(x1v,x2v)-2
let maxX=Math.max(x1v,x2v)+2
let minY=Math.min(y1v,y2v)-2
let maxY=Math.max(y1v,y2v)+2

functionPlot({
target:"#plot",
width:width,
height:400,
grid:true,

xAxis:{domain:[minX,maxX]},
yAxis:{domain:[minY,maxY]},

data:[

// noktalar
{
points:[[x1v,y1v],[x2v,y2v]],
fnType:"points",
graphType:"scatter"
},

// çizgi
{
points:[[x1v,y1v],[x2v,y2v]],
fnType:"points",
graphType:"polyline"
}

]
})
}
             
// mesafe
let d=Math.sqrt((x2v-x1v)**2+(y2v-y1v)**2)

result.innerHTML="Mesafe = "+d.toFixed(2)

// çizgi fonksiyonu (iki nokta arası doğru)
let m=(y2v-y1v)/(x2v-x1v)
let line=`${m}*(x-${x1v})+${y1v}`

// dikey doğru kontrolü
let isVertical = (x1v===x2v)

let data=[

// noktalar
{
points:[[x1v,y1v],[x2v,y2v]],
fnType:"points",
graphType:"scatter",
color:"red"
}

]

// eğer dikey değilse çizgi çiz
if(!isVertical){
data.push({fn:line,color:"blue"})
}else{
data.push({fn:`x=${x1v}`,color:"blue"})
}

functionPlot({
target:"#plot",
width:width,
height:400,
grid:true,
data:data
})

}
  
}catch(e){

result.innerHTML="Hata: "+e.message

}

}

function calc(val){
document.getElementById("calcDisplay").value+=val
}

function calculate(){

let val=document.getElementById("calcDisplay").value

try{
document.getElementById("calcDisplay").value=math.evaluate(val)
}catch{
document.getElementById("calcDisplay").value="Hata"
}

}

function clearCalc(){
document.getElementById("calcDisplay").value=""
}

function downloadPNG(){

let svg=document.querySelector("#plot svg")

if(!svg){
alert("Önce grafiği çiz")
return
}

let rect=svg.getBoundingClientRect()

let width=rect.width
let height=rect.height

let serializer=new XMLSerializer()
let source=serializer.serializeToString(svg)

let img=new Image()

img.onload=function(){

let canvas=document.createElement("canvas")

canvas.width=width*3
canvas.height=height*3

let ctx=canvas.getContext("2d")

ctx.scale(3,3)

ctx.fillStyle="white"
ctx.fillRect(0,0,width,height)

ctx.drawImage(img,0,0,width,height)

let link=document.createElement("a")

link.download="grafik.png"
link.href=canvas.toDataURL("image/png")
link.click()

}

img.src="data:image/svg+xml;base64," + btoa(unescape(encodeURIComponent(source)))

}

window.addEventListener("resize",draw)
window.onload=draw

</script>

</body>
</html>
