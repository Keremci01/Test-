<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8">
<title>Math Calculator</title>

<link rel="stylesheet" href="index.css">

<script src="https://cdn.jsdelivr.net/npm/function-plot/dist/function-plot.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.11.0/math.min.js"></script>

<style>

.dark{
background:#121212;
color:white;
}

.dark #menu{
background:#0d1b2a;
}

.dark button{
background:#1e1e1e;
color:white;
border:1px solid #444;
}

.dark input{
background:#1e1e1e;
color:white;
border:1px solid #444;
}

</style>

</head>

<body>

<div id="hamburger" onclick="toggleMenu()">☰</div>

<div id="menu">

<h3>Menü</h3>

<button onclick="toggleGroup('funcGroup')">Fonksiyonlar ▼</button>

<div id="funcGroup" style="display:none">

<button onclick="setMode('function')">Fonksiyon Grafiği</button>
<button onclick="setMode('multi')">Çoklu Fonksiyon Çiz</button>
<button onclick="setMode('distance')">İki Nokta Mesafe</button>

</div>

<button onclick="toggleGroup('analysisGroup')">Analiz ▼</button>

<div id="analysisGroup" style="display:none">

<button onclick="setMode('derivative')">Türev</button>
<button onclick="setMode('integral')">İntegral</button>
<button onclick="setMode('tangent')">Teğet</button>
<button onclick="setMode('limit')">Limit</button>

</div>

<button onclick="toggleDark()">🌙 Dark Mode</button>

</div>

<div id="content">

<h2 id="title">Fonksiyon Grafiği</h2>

<input id="func" placeholder="x^2">

<input id="func2" placeholder="ikinci fonksiyon" style="display:none">
<input id="func3" placeholder="üçüncü fonksiyon" style="display:none">

<input id="a" type="number" placeholder="a" style="display:none">
<input id="b" type="number" placeholder="b" style="display:none">

<input id="x0" type="number" placeholder="x noktası" style="display:none">

<input id="x1" type="number" placeholder="x1" style="display:none">
<input id="y1" type="number" placeholder="y1" style="display:none">
<input id="x2" type="number" placeholder="x2" style="display:none">
<input id="y2" type="number" placeholder="y2" style="display:none">

<br><br>

<button onclick="draw()">Grafiği Çiz</button>
<button onclick="downloadPNG()">PNG indir</button>

<div id="plot"></div>

<div id="result"></div>

</div>

<script>

let mode="function"

function toggleMenu(){

let m=document.getElementById("menu")
m.style.display = m.style.display==="block" ? "none":"block"

}

function toggleGroup(id){

let g=document.getElementById(id)
g.style.display = g.style.display==="block" ? "none":"block"

}

function toggleDark(){

document.body.classList.toggle("dark")

}

function hideInputs(){

document.getElementById("func2").style.display="none"
document.getElementById("func3").style.display="none"

document.getElementById("a").style.display="none"
document.getElementById("b").style.display="none"

document.getElementById("x0").style.display="none"

document.getElementById("x1").style.display="none"
document.getElementById("y1").style.display="none"
document.getElementById("x2").style.display="none"
document.getElementById("y2").style.display="none"

}

function clearInputs(){

document.getElementById("func2").value=""
document.getElementById("func3").value=""

document.getElementById("a").value=""
document.getElementById("b").value=""

document.getElementById("x0").value=""

document.getElementById("x1").value=""
document.getElementById("y1").value=""
document.getElementById("x2").value=""
document.getElementById("y2").value=""

}

function setMode(m){

mode=m

hideInputs()
clearInputs()

document.getElementById("plot").innerHTML=""
document.getElementById("result").innerHTML=""

if(m==="function"){
title.innerText="Fonksiyon Grafiği"
}

if(m==="multi"){

title.innerText="Çoklu Fonksiyon"

document.getElementById("func2").style.display="inline"
document.getElementById("func3").style.display="inline"

}

if(m==="distance"){

title.innerText="İki Nokta Mesafe"

document.getElementById("x1").style.display="inline"
document.getElementById("y1").style.display="inline"

document.getElementById("x2").style.display="inline"
document.getElementById("y2").style.display="inline"

}

if(m==="derivative"){
title.innerText="Türev Grafiği"
}

if(m==="integral"){

title.innerText="İntegral Alanı"

document.getElementById("a").style.display="inline"
document.getElementById("b").style.display="inline"

}

if(m==="tangent"){

title.innerText="Teğet"

document.getElementById("x0").style.display="inline"

}

if(m==="limit"){

title.innerText="Limit"

document.getElementById("x0").style.display="inline"

}

}

function draw(){

let plot=document.getElementById("plot")
let result=document.getElementById("result")

plot.innerHTML=""
result.innerHTML=""

let width=plot.offsetWidth

let f=document.getElementById("func").value

try{

if(mode==="function"){

functionPlot({

target:"#plot",
width:width,
height:400,
grid:true,

data:[
{fn:f,sampler:"builtIn"}
]

})

}

if(mode==="multi"){

let data=[]

if(f!="") data.push({fn:f,sampler:"builtIn"})

let f2=document.getElementById("func2").value
let f3=document.getElementById("func3").value

if(f2!="") data.push({fn:f2,sampler:"builtIn"})
if(f3!="") data.push({fn:f3,sampler:"builtIn"})

functionPlot({

target:"#plot",
width:width,
height:400,
grid:true,
data:data

})

}

if(mode==="distance"){

let x1=Number(document.getElementById("x1").value)
let y1=Number(document.getElementById("y1").value)
let x2=Number(document.getElementById("x2").value)
let y2=Number(document.getElementById("y2").value)

let d=Math.sqrt((x2-x1)**2+(y2-y1)**2)

result.innerHTML="Mesafe = "+d

functionPlot({

target:"#plot",
width:width,
height:400,
grid:true,

data:[{

points:[[x1,y1],[x2,y2]],
fnType:"points",
graphType:"scatter"

}]

})

}

if(mode==="derivative"){

let d=math.derivative(f,"x").toString()

result.innerHTML="f'(x) = "+d

functionPlot({

target:"#plot",
width:width,
height:400,
grid:true,

data:[
{fn:f},
{fn:d}
]

})

}

if(mode==="integral"){

let a=Number(document.getElementById("a").value)
let b=Number(document.getElementById("b").value)

result.innerHTML="Alan ["+a+","+b+"]"

functionPlot({

target:"#plot",
width:width,
height:400,
grid:true,

data:[
{fn:f},
{fn:f,range:[a,b],closed:true}
]

})

}

if(mode==="tangent"){

let x=Number(document.getElementById("x0").value)

let derivative=math.derivative(f,"x")

let slope=derivative.evaluate({x:x})

let y=math.evaluate(f,{x:x})

let tangent=slope+"*(x-"+x+")+"+y

result.innerHTML="Teğet: "+tangent

functionPlot({

target:"#plot",
width:width,
height:400,
grid:true,

data:[
{fn:f},
{fn:tangent}
]

})

}

if(mode==="limit"){

let x=Number(document.getElementById("x0").value)

let f1=math.evaluate(f,{x:x+0.00001})
let f2=math.evaluate(f,{x:x-0.00001})

let lim=(f1+f2)/2

result.innerHTML="Limit ≈ "+lim

}

}catch(e){

result.innerHTML="Hata: "+e.message

}

}

function downloadPNG(){

let svg=document.querySelector("#plot svg")

if(!svg){

alert("Önce grafiği çiz")

return

}

let rect=svg.getBoundingClientRect()

let width=rect.width
let height=rect.height

let serializer=new XMLSerializer()

let source=serializer.serializeToString(svg)

let img=new Image()

img.onload=function(){

let canvas=document.createElement("canvas")

canvas.width=width*3
canvas.height=height*3

let ctx=canvas.getContext("2d")

ctx.scale(3,3)

ctx.fillStyle="white"

ctx.fillRect(0,0,width,height)

ctx.drawImage(img,0,0,width,height)

let link=document.createElement("a")

link.download="grafik.png"

link.href=canvas.toDataURL("image/png")

link.click()

}

img.src="data:image/svg+xml;base64," + btoa(unescape(encodeURIComponent(source)))

}

window.addEventListener("resize",draw)

window.onload=draw

</script>

</body>
</html>
