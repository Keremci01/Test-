<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Math Calculator</title>

<script src="https://cdn.jsdelivr.net/npm/function-plot/dist/function-plot.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.11.0/math.min.js"></script>

<style>

/* GENEL */
body{
font-family:'Segoe UI', Arial, sans-serif;
margin:0;
background:linear-gradient(135deg,#eef2ff,#e0f2fe);
color:#1f2937;
}

/* HAMBURGER */
#hamburger{
font-size:26px;
position:fixed;
top:15px;
left:15px;
cursor:pointer;
background:white;
padding:10px 14px;
border-radius:12px;
z-index:1001;
box-shadow:0 6px 15px rgba(0,0,0,0.2);
}

/* MENU */
#menu{
position:fixed;
top:0;
left:0;
width:250px;
height:100%;
background:#111827;
color:white;
padding:25px;
padding-top:80px;

transform:translateX(-100%);
transition:0.3s;
z-index:1000;
}

#menu.active{
transform:translateX(0);
}

/* MENU BUTTON */
#menu button{
width:100%;
padding:12px;
margin:10px 0;
background:#1f2937;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
}

#menu button:hover{
background:#2563eb;
}

/* CONTENT */
#content{
margin-left:60px;
padding:40px;
}

/* INPUT */
input{
padding:10px;
border-radius:10px;
border:1px solid #ccc;
}

/* BUTTON */
#content button{
background:#2563eb;
color:white;
padding:10px 20px;
border:none;
border-radius:10px;
cursor:pointer;
}

/* GRAPH */
#plot{
margin-top:30px;
background:white;
padding:20px;
border-radius:16px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

</style>

</head>

<body>

<div id="hamburger" onclick="toggleMenu()">☰</div>

<div id="menu">

<h3>Menü</h3>

<button onclick="toggleGroup('funcGroup')">Fonksiyonlar ▼</button>

<div id="funcGroup" style="display:none">
<button onclick="setMode('function')">Fonksiyon Grafiği</button>
<button onclick="setMode('multi')">Çoklu Fonksiyon</button>
</div>

<button onclick="toggleGroup('analysisGroup')">Analiz ▼</button>

<div id="analysisGroup" style="display:none">
<button onclick="setMode('derivative')">Türev</button>
<button onclick="setMode('integral')">İntegral</button>
</div>

</div>

<div id="content">

<h2>Fonksiyon Grafiği</h2>

<input id="func" value="x^2">

<br><br>

<button onclick="draw()">Grafiği Çiz</button>

<div id="plot"></div>

</div>

<script>

/* MENU */
function toggleMenu(){
document.getElementById("menu").classList.toggle("active");
}

/* GROUP */
function toggleGroup(id){
let el = document.getElementById(id);
el.style.display = (el.style.display === "none") ? "block" : "none";
}

/* GRAPH */
function draw(){
let func = document.getElementById("func").value;

functionPlot({
target:"#plot",
width:500,
height:400,
grid:true,
data:[{fn:func}]
});
}

/* AUTO DRAW */
window.onload = function(){
draw();
}

</script>

</body>
</html>
