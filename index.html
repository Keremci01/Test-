<!DOCTYPE html>

<html>
<head>
<meta charset="utf-8">
<title>Math Tool</title>

<link rel="stylesheet" href="index.css">

<script src="https://cdn.jsdelivr.net/npm/function-plot/dist/function-plot.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.11.0/math.min.js"></script>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f6f9;
}

/* hamburger */

#hamburger{
font-size:28px;
position:fixed;
top:12px;
left:12px;
cursor:pointer;
background:white;
padding:8px 12px;
border-radius:6px;
box-shadow:0 2px 6px rgba(0,0,0,0.2);
z-index:1001;
}

/* menu */

#menu{
position:fixed;
left:0;
top:0;
width:230px;
height:100%;
background:#1f1f1f;
color:white;
padding:25px;
padding-top:70px;
display:none;
z-index:1000;
}

#menu h3{
margin-left:35px;
margin-bottom:25px;
font-size:20px;
}

#menu button{
width:100%;
padding:12px;
margin:10px 0;
font-size:15px;
border:none;
border-radius:6px;
background:#2e2e2e;
color:white;
cursor:pointer;
}

#content{
margin-left:60px;
padding:25px;
}

#plot{
width:800px;
height:500px;
margin-top:20px;
background:white;
border-radius:10px;
}

</style>

</head>

<body>

<div id="hamburger" onclick="toggleMenu()">☰</div>

<div id="menu">

<h3>Menü</h3>

<button onclick="showGraph()">Fonksiyon Grafiği</button> <button onclick="showDerivative()">Türev Grafiği</button>

</div>

<div id="content">

<h2 id="title">Fonksiyon Grafiği</h2>

<input id="func" value="x^2">

<button onclick="drawGraph()">Grafiği Çiz</button>

<div id="plot"></div>

</div>

<script>

let mode = "function";

function toggleMenu(){

var m=document.getElementById("menu");

if(m.style.display==="block"){
m.style.display="none";
}else{
m.style.display="block";
}

}

function showGraph(){

mode="function";

document.getElementById("title").innerHTML="Fonksiyon Grafiği";

toggleMenu();

draw();

}

function showDerivative(){

mode="derivative";

document.getElementById("title").innerHTML="Türev Grafiği";

toggleMenu();

drawDerivative();

}

function drawGraph(){

if(mode==="function"){
draw();
}else{
drawDerivative();
}

}

function draw(){

var f=document.getElementById("func").value;

functionPlot({
target:'#plot',
width:800,
height:500,
grid:true,
data:[
{fn:f}
]
});

}

function drawDerivative(){

var f=document.getElementById("func").value;

var d=math.derivative(f,"x").toString();

functionPlot({
target:'#plot',
width:800,
height:500,
grid:true,
data:[
{fn:d}
]
});

}

window.onload=draw;

</script>

</body>
</html>
