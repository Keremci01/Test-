<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Math Calculator</title>

<script src="https://cdn.jsdelivr.net/npm/function-plot/dist/function-plot.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.11.0/math.min.js"></script>

<style>

/* GENEL */
body{
font-family:'Segoe UI', Arial, sans-serif;
margin:0;
background:linear-gradient(135deg,#eef2ff,#e0f2fe);
color:#1f2937;
}

/* DARK MODE */
.dark{
background:#121212;
color:white;
}
.dark #plot{background:#1e1e1e;}
.dark #menu{background:#0d1b2a;}

/* HAMBURGER */
#hamburger{
font-size:26px;
position:fixed;
top:15px;
left:15px;
cursor:pointer;
background:white;
padding:10px 14px;
border-radius:12px;
z-index:1001;
box-shadow:0 6px 15px rgba(0,0,0,0.2);
}

/* MENU */
#menu{
position:fixed;
top:0;
left:0;
width:250px;
height:100%;
background:#111827;
color:white;
padding:25px;
padding-top:80px;
transform:translateX(-100%);
transition:0.3s;
z-index:1000;
}
#menu.active{transform:translateX(0);}

/* MENU BUTTON */
#menu button{
width:100%;
padding:12px;
margin:10px 0;
background:#1f2937;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
transition:0.2s;
}

/* 🔥 HOVER FIX */
#menu button:hover{
background:linear-gradient(135deg,#2563eb,#1d4ed8);
transform:translateX(5px) scale(1.05);
}

/* CONTENT */
#content{
margin-left:60px;
padding:40px;
}

/* INPUT */
input{
padding:10px;
border-radius:10px;
border:1px solid #ccc;
margin:5px;
}

/* BUTTON */
#content button{
background:#2563eb;
color:white;
padding:10px 20px;
border:none;
border-radius:10px;
cursor:pointer;
}

/* GRAPH */
#plot{
margin-top:30px;
width:100%;
height:500px;
background:white;
padding:10px;
border-radius:16px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

</style>

</head>

<body>

<div id="hamburger" onclick="toggleMenu()">☰</div>

<div id="menu">

<h3>Menü</h3>

<button onclick="toggleGroup('funcGroup')">Fonksiyonlar ▼</button>

<div id="funcGroup" style="display:none">
<button onclick="setMode('function')">Fonksiyon</button>
<button onclick="setMode('multi')">Çoklu Fonksiyon</button>
<button onclick="setMode('distance')">İki Nokta Arası Mesafe</button>
</div>

<button onclick="toggleGroup('analysisGroup')">Analiz ▼</button>

<div id="analysisGroup" style="display:none">
<button onclick="setMode('derivative')">Türev</button>
<button onclick="setMode('integral')">İntegral</button>
<button onclick="setMode('tangent')">Teğet</button>
<button onclick="setMode('limit')">Limit</button>
</div>

<button onclick="setMode('calculator')">🧮 Hesap Makinesi</button>
<button onclick="toggleDark()">🌙 Dark Mode</button>

</div>

<div id="content">

<h2 id="title">Fonksiyon Grafiği</h2>

<input id="func" value="x^2">
<input id="func2" placeholder="f2" style="display:none">
<input id="func3" placeholder="f3" style="display:none">

<input id="x1" placeholder="x1" style="display:none">
<input id="y1" placeholder="y1" style="display:none">
<input id="x2" placeholder="x2" style="display:none">
<input id="y2" placeholder="y2" style="display:none">

<input id="a" placeholder="a" style="display:none">
<input id="b" placeholder="b" style="display:none">

<input id="x0" placeholder="x noktası" style="display:none">

<br><br>

<button onclick="draw()">Grafiği Çiz</button>
<button onclick="downloadPNG()">PNG İndir</button>

<div id="plot"></div>

<div id="result"></div>

<!-- CALCULATOR -->
<div id="calculator" style="display:none; max-width:260px; margin-top:20px;">
<input id="calcDisplay" style="width:100%;padding:10px;font-size:20px;margin-bottom:10px;">
<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;">
<button onclick="calc('7')">7</button>
<button onclick="calc('8')">8</button>
<button onclick="calc('9')">9</button>
<button onclick="calc('/')">÷</button>

<button onclick="calc('4')">4</button>
<button onclick="calc('5')">5</button>
<button onclick="calc('6')">6</button>
<button onclick="calc('*')">×</button>

<button onclick="calc('1')">1</button>
<button onclick="calc('2')">2</button>
<button onclick="calc('3')">3</button>
<button onclick="calc('-')">−</button>

<button onclick="calc('0')">0</button>
<button onclick="calc('.')">.</button>
<button onclick="calculate()">=</button>
<button onclick="calc('+')">+</button>

<button onclick="clearCalc()">C</button>
</div>
</div>

</div>

<script>

/* MENU */
function toggleMenu(){
document.getElementById("menu").classList.toggle("active");
}

/* GROUP */
function toggleGroup(id){
let el = document.getElementById(id);
el.style.display = (el.style.display === "none") ? "block" : "none";
}

/* MODE */
function setMode(mode){

document.querySelectorAll("input").forEach(i=>i.style.display="none");
document.getElementById("calculator").style.display="none";

let title = document.getElementById("title");

if(mode==="function"){
title.innerText="Fonksiyon";
document.getElementById("func").style.display="inline-block";
}

if(mode==="multi"){
title.innerText="Çoklu Fonksiyon";
["func","func2","func3"].forEach(id=>document.getElementById(id).style.display="inline-block");
}

if(mode==="distance"){
title.innerText="Mesafe";
["x1","y1","x2","y2"].forEach(id=>document.getElementById(id).style.display="inline-block");
}

if(mode==="derivative"){
title.innerText="Türev";
["func","x0"].forEach(id=>document.getElementById(id).style.display="inline-block");
}

if(mode==="integral"){
title.innerText="İntegral";
["func","a","b"].forEach(id=>document.getElementById(id).style.display="inline-block");
}

if(mode==="tangent"){
title.innerText="Teğet";
["func","x0"].forEach(id=>document.getElementById(id).style.display="inline-block");
}

if(mode==="limit"){
title.innerText="Limit";
["func","x0"].forEach(id=>document.getElementById(id).style.display="inline-block");
}

if(mode==="calculator"){
title.innerText="Hesap Makinesi";
document.getElementById("calculator").style.display="block";
}
}

/* GRAPH */
function draw(){
let func = document.getElementById("func").value;

functionPlot({
target:"#plot",
width:document.getElementById("plot").offsetWidth,
height:500,
grid:true,
data:[{fn:func}]
});
}

/* DARK */
function toggleDark(){
document.body.classList.toggle("dark");
}

/* CALC */
function calc(v){document.getElementById("calcDisplay").value+=v;}
function calculate(){
try{
document.getElementById("calcDisplay").value=eval(document.getElementById("calcDisplay").value);
}catch{alert("Hata");}
}
function clearCalc(){document.getElementById("calcDisplay").value="";}

/* AUTO */
window.onload=draw;

</script>

</body>
</html>
