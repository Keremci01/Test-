<!DOCTYPE html>

<html>

<head>

<meta charset="utf-8">
<title>Math Graph</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/function-plot/dist/function-plot.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.11.0/math.min.js"></script>

</head>

<body>

<div id="hamburger" onclick="toggleMenu()">☰</div>

<div id="menu">

<h3>Menü</h3>

<button onclick="toggleGroup('funcGroup')">Fonksiyonlar</button>

<div id="funcGroup" style="display:none">

<button onclick="setMode('function')">Fonksiyon Grafiği</button> <button onclick="setMode('multi')">Çoklu Fonksiyon</button> <button onclick="setMode('distance')">İki Nokta Mesafe</button>

</div>

<button onclick="toggleGroup('analysisGroup')">Analiz</button>

<div id="analysisGroup" style="display:none">

<button onclick="setMode('derivative')">Türev</button> <button onclick="setMode('integral')">İntegral</button> <button onclick="setMode('tangent')">Teğet</button> <button onclick="setMode('limit')">Limit</button>

</div>

</div>

<div id="content">

<h2 id="title">Fonksiyon Grafiği</h2>

<div style="display:flex;align-items:center;gap:8px">
<input id="func" placeholder="x^2">
<input type="color" id="color1" class="colorPicker" value="#2563eb">
</div>

<div id="multi2" style="display:none;align-items:center;gap:8px;margin-top:8px">
<input id="func2" placeholder="x^3">
<input type="color" id="color2" class="colorPicker" value="#e11d48">
</div>

<div id="multi3" style="display:none;align-items:center;gap:8px;margin-top:8px">
<input id="func3" placeholder="sin(x)">
<input type="color" id="color3" class="colorPicker" value="#16a34a">
</div>

<br>

<input id="a" placeholder="a" style="display:none">
<input id="b" placeholder="b" style="display:none">

<input id="x0" placeholder="x noktası" style="display:none">

<input id="x1" placeholder="x1" style="display:none">
<input id="y1" placeholder="y1" style="display:none">

<input id="x2" placeholder="x2" style="display:none">
<input id="y2" placeholder="y2" style="display:none">

<br><br>

<button onclick="draw()">Grafiği Çiz</button> <button onclick="downloadPNG()">PNG indir</button>

<div id="plot"></div>

<div id="result"></div>

</div>

<script>

let mode="function"

function toggleMenu(){
let m=document.getElementById("menu")
m.style.display=m.style.display==="block"?"none":"block"
}

function toggleGroup(id){
let g=document.getElementById(id)
g.style.display=g.style.display==="block"?"none":"block"
}

function setMode(m){

mode=m

multi2.style.display="none"
multi3.style.display="none"

a.style.display="none"
b.style.display="none"

x0.style.display="none"

x1.style.display="none"
y1.style.display="none"
x2.style.display="none"
y2.style.display="none"

if(m==="function"){
title.innerText="Fonksiyon Grafiği"
}

if(m==="multi"){

title.innerText="Çoklu Fonksiyon"

multi2.style.display="flex"
multi3.style.display="flex"

}

if(m==="derivative"){
title.innerText="Türev"
}

if(m==="integral"){

title.innerText="İntegral Alanı"

a.style.display="inline"
b.style.display="inline"

}

if(m==="tangent"){

title.innerText="Teğet"

x0.style.display="inline"

}

if(m==="limit"){

title.innerText="Limit"

x0.style.display="inline"

}

if(m==="distance"){

title.innerText="İki Nokta Mesafe"

x1.style.display="inline"
y1.style.display="inline"

x2.style.display="inline"
y2.style.display="inline"

}

}

function draw(){

plot.innerHTML=""
result.innerHTML=""

let width=plot.offsetWidth

let f=func.value

try{

if(mode==="function"){

functionPlot({

target:"#plot",
width:width,
height:400,
grid:true,

data:[
{fn:f,color:color1.value}
]

})

}

if(mode==="multi"){

let data=[]

if(func.value!="")
data.push({fn:func.value,color:color1.value})

if(func2.value!="")
data.push({fn:func2.value,color:color2.value})

if(func3.value!="")
data.push({fn:func3.value,color:color3.value})

functionPlot({

target:"#plot",
width:width,
height:400,
grid:true,
data:data

})

}

if(mode==="derivative"){

let d=math.derivative(f,"x").toString()

result.innerHTML="f'(x) = "+d

functionPlot({

target:"#plot",
width:width,
height:400,
grid:true,

data:[
{fn:f,color:color1.value},
{fn:d,color:"red"}
]

})

}

if(mode==="integral"){

let aVal=Number(a.value)
let bVal=Number(b.value)

functionPlot({

target:"#plot",
width:width,
height:400,
grid:true,

data:[

{fn:f,color:color1.value},

{
fn:f,
range:[aVal,bVal],
closed:true,
color:"rgba(0,120,255,0.3)"
},

{fn:"x="+aVal,color:"red"},
{fn:"x="+bVal,color:"red"}

]

})

}

if(mode==="tangent"){

let x=Number(x0.value)

let d=math.derivative(f,"x")

let slope=d.evaluate({x:x})

let y=math.evaluate(f,{x:x})

let t=slope+"*(x-"+x+")+"+y

result.innerHTML="Teğet: "+t

functionPlot({

target:"#plot",
width:width,
height:400,
grid:true,

data:[
{fn:f,color:color1.value},
{fn:t,color:"red"}
]

})

}

if(mode==="limit"){

let x=Number(x0.value)

let f1=math.evaluate(f,{x:x+0.00001})
let f2=math.evaluate(f,{x:x-0.00001})

let lim=(f1+f2)/2

result.innerHTML="Limit ≈ "+lim

}

if(mode==="distance"){

let x1v=Number(x1.value)
let y1v=Number(y1.value)

let x2v=Number(x2.value)
let y2v=Number(y2.value)

let d=Math.sqrt((x2v-x1v)**2+(y2v-y1v)**2)

result.innerHTML="Mesafe = "+d

functionPlot({

target:"#plot",
width:width,
height:400,
grid:true,

data:[
{
points:[[x1v,y1v],[x2v,y2v]],
fnType:"points",
graphType:"scatter"
}
]

})

}

}catch(e){

result.innerHTML="Hata: "+e.message

}

}

function downloadPNG(){

let svg=document.querySelector("#plot svg")

if(!svg){
alert("Önce grafik çiz")
return
}

let rect=svg.getBoundingClientRect()

let width=rect.width
let height=rect.height

let serializer=new XMLSerializer()
let source=serializer.serializeToString(svg)

let img=new Image()

img.onload=function(){

let canvas=document.createElement("canvas")

canvas.width=width*3
canvas.height=height*3

let ctx=canvas.getContext("2d")

ctx.scale(3,3)

ctx.fillStyle="white"
ctx.fillRect(0,0,width,height)

ctx.drawImage(img,0,0,width,height)

let link=document.createElement("a")

link.download="grafik.png"
link.href=canvas.toDataURL()
link.click()

}

img.src="data:image/svg+xml;base64,"+btoa(unescape(encodeURIComponent(source)))

}

</script>

</body>
</html>
