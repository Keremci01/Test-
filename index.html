<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Math Calculator</title>

<link rel="stylesheet" href="index.css">

<script src="https://cdn.jsdelivr.net/npm/function-plot/dist/function-plot.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.11.0/math.min.js"></script>

<style>

.dark{
background:#121212;
color:white;
}

.dark #menu{
background:#0d1b2a;
}

.dark button{
background:#1e1e1e;
color:white;
border:1px solid #444;
}

.dark input{
background:#1e1e1e;
color:white;
border:1px solid #444;
}

#coords{
margin-top:10px;
font-size:14px;
opacity:0.8;
}

#coords:hover{
opacity:1;
transform:scale(1.05);
}

#plot{
border-radius:12px;
overflow:hidden;
box-shadow:0 0 15px rgba(0,0,0,0.3);
}

/* 📱 MOBİL */
@media (max-width: 768px){

#content{
margin-left:0;
padding:20px;
}

#menu{
width:100%;
}

input{
width:100%;
margin:8px 0;
}

#content button{
width:100%;
margin-top:10px;
}

#plot{
padding:10px;
}

#calculator{
max-width:100%;
}

}

</style>

</head>

<body>

<div id="hamburger" onclick="toggleMenu()">☰</div>

<div id="menu">

<h3>Menü</h3>

<button onclick="toggleGroup('funcGroup')">Fonksiyonlar ▼</button>

<div id="funcGroup" style="display:none">

<button onclick="setMode('function')">Fonksiyon Grafiği</button>
<button onclick="setMode('multi')">Çoklu Fonksiyon Çiz</button>
<button onclick="setMode('distance')">İki Nokta Mesafe</button>

</div>

<button onclick="toggleGroup('analysisGroup')">Analiz ▼</button>

<div id="analysisGroup" style="display:none">

<button onclick="setMode('derivative')">Türev</button>
<button onclick="setMode('integral')">İntegral</button>
<button onclick="setMode('tangent')">Teğet</button>
<button onclick="setMode('limit')">Limit</button>

</div>

<button onclick="setMode('calculator')">🧮 Hesap Makinesi</button>

<button onclick="toggleDark()">🌙 Dark Mode</button>

</div>

<div id="content">

<h2 id="title">Fonksiyon Grafiği</h2>

<input id="func" placeholder="x^2">

<input id="func2" placeholder="ikinci fonksiyon" style="display:none">
<input id="func3" placeholder="üçüncü fonksiyon" style="display:none">

<input id="a" type="number" placeholder="a" style="display:none">
<input id="b" type="number" placeholder="b" style="display:none">

<input id="x0" type="number" placeholder="x noktası" style="display:none">

<input id="x1" type="number" placeholder="x1" style="display:none">
<input id="y1" type="number" placeholder="y1" style="display:none">
<input id="x2" type="number" placeholder="x2" style="display:none">
<input id="y2" type="number" placeholder="y2" style="display:none">

<br><br>

<div id="graphButtons">
<button onclick="draw()">Grafiği Çiz</button>
<button onclick="downloadPNG()">PNG indir</button>
<button onclick="findIntersections()">Kesişim Bul</button>
</div>

<div id="plot"></div>
<div id="coords">x: 0 | y: 0</div>
<div id="result"></div>

<div id="calculator" style="display:none; max-width:260px; margin-top:20px;">

<input id="calcDisplay" style="width:100%;padding:10px;font-size:20px;margin-bottom:10px;" placeholder="0">

<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;">

<button onclick="calc('7')">7</button>
<button onclick="calc('8')">8</button>
<button onclick="calc('9')">9</button>
<button onclick="calc('/')">÷</button>

<button onclick="calc('4')">4</button>
<button onclick="calc('5')">5</button>
<button onclick="calc('6')">6</button>
<button onclick="calc('*')">×</button>

<button onclick="calc('1')">1</button>
<button onclick="calc('2')">2</button>
<button onclick="calc('3')">3</button>
<button onclick="calc('-')">−</button>

<button onclick="calc('0')">0</button>
<button onclick="calc('.')">.</button>
<button onclick="calculate()">=</button>
<button onclick="calc('+')">+</button>

<button onclick="clearCalc()">C</button>

</div>

</div>

</div>

<script>

let mode="function"
let currentPlot=null

function lockScroll(lock){
document.body.style.overflow = lock ? "hidden" : "auto"
}

function toggleMenu(){
let m=document.getElementById("menu")

if(m.style.display==="block"){
m.style.display="none"
lockScroll(false)
}else{
m.style.display="block"
lockScroll(true)
}
}

function toggleGroup(id){

let g=document.getElementById(id)

if(g.style.display==="block"){
g.style.display="none"
return
}

document.querySelectorAll("#menu div").forEach(el=>{
if(el.id.includes("Group")) el.style.display="none"
})

g.style.display="block"
}

function toggleDark(){
document.body.classList.toggle("dark")
}

function hideInputs(){
func2.style.display="none"
func3.style.display="none"
a.style.display="none"
b.style.display="none"
x0.style.display="none"
x1.style.display="none"
y1.style.display="none"
x2.style.display="none"
y2.style.display="none"
}

function clearInputs(){
func2.value=""
func3.value=""
a.value=""
b.value=""
x0.value=""
x1.value=""
y1.value=""
x2.value=""
y2.value=""
}

function setMode(m){

mode=m

func.style.display="inline"

hideInputs()
clearInputs()

plot.innerHTML=""
result.innerHTML=""

document.getElementById("calculator").style.display="none"
document.getElementById("graphButtons").style.display="block"
document.getElementById("plot").style.display="block"

if(m==="function"){ title.innerText="Fonksiyon Grafiği" }

if(m==="multi"){
title.innerText="Çoklu Fonksiyon"
func2.style.display="inline"
func3.style.display="inline"
}

if(m==="distance"){
title.innerText="İki Nokta Mesafe"
x1.style.display="inline"
y1.style.display="inline"
x2.style.display="inline"
y2.style.display="inline"
}

if(m==="derivative"){ title.innerText="Türev Grafiği" }

if(m==="integral"){
title.innerText="İntegral Alanı"
a.style.display="inline"
b.style.display="inline"
}

if(m==="tangent"){
title.innerText="Teğet"
x0.style.display="inline"
}

if(m==="limit"){
title.innerText="Limit"
x0.style.display="inline"
}

if(m==="calculator"){
title.innerText="Hesap Makinesi"
document.getElementById("calculator").style.display="block"
document.getElementById("graphButtons").style.display="none"
document.getElementById("plot").style.display="none"
func.style.display="none"
return
}
}

/* 🔥 DRAW + PRO */
function draw(){

plot.innerHTML=""
result.innerHTML=""

let width=plot.clientWidth || 400
let f=func.value

try{

let config={
target:"#plot",
width:width,
height:400,
grid:true,
zoom:true,
pan:true,
data:[]
}

if(mode==="function"){
config.data=[{fn:f}]
}

if(mode==="multi"){
let d=[{fn:f}]
if(func2.value!="") d.push({fn:func2.value})
if(func3.value!="") d.push({fn:func3.value})
config.data=d
}

if(mode==="derivative"){
let d=math.derivative(f,"x").toString()
result.innerHTML="f'(x) = "+d
config.data=[{fn:f},{fn:d}]
}

if(mode==="integral"){
let aVal=Number(a.value)
let bVal=Number(b.value)
config.data=[
{fn:f},
{fn:f,range:[aVal,bVal],closed:true,color:"rgba(0,120,255,0.3)"},
{fn:"x="+aVal,color:"red"},
{fn:"x="+bVal,color:"red"}
]
}

if(mode==="tangent"){
let x=Number(x0.value)
let d=math.derivative(f,"x")
let slope=d.evaluate({x:x})
let y=math.evaluate(f,{x:x})
let t=slope+"*(x-"+x+")+"+y
result.innerHTML="Teğet: "+t
config.data=[{fn:f},{fn:t}]
}

if(mode==="limit"){
let x=Number(x0.value)
let f1=math.evaluate(f,{x:x+0.00001})
let f2=math.evaluate(f,{x:x-0.00001})
result.innerHTML="Limit ≈ "+((f1+f2)/2)
config.data=[{fn:f}]
}

if(mode==="distance"){

let x1v=Number(x1.value)
let y1v=Number(y1.value)
let x2v=Number(x2.value)
let y2v=Number(y2.value)

let d=Math.sqrt((x2v-x1v)**2+(y2v-y1v)**2)
result.innerHTML="Mesafe = "+d.toFixed(2)

config.data=[
{points:[[x1v,y1v],[x2v,y2v]],fnType:"points",graphType:"scatter"},
{points:[[x1v,y1v],[x2v,y2v]],fnType:"points",graphType:"polyline"}
]
}

let p=functionPlot(config)
setupInteractions(p)

}catch(e){
result.innerHTML="Hata: "+e.message
}

}

/* 🎯 INTERACTION */
function setupInteractions(p){

currentPlot=p

plot.onmousemove=function(e){

let rect=plot.getBoundingClientRect()

let x=p.meta.xScale.invert(e.clientX-rect.left)
let y=p.meta.yScale.invert(e.clientY-rect.top)

coords.innerText=`x: ${x.toFixed(2)} | y: ${y.toFixed(2)}`
}

plot.onclick=function(e){

let rect=plot.getBoundingClientRect()

let x=p.meta.xScale.invert(e.clientX-rect.left)
let y=p.meta.yScale.invert(e.clientY-rect.top)

functionPlot({
target:"#plot",
width:plot.clientWidth,
height:400,
zoom:true,
pan:true,
grid:true,
data:[
...p.options.data,
{
points:[[x,y]],
fnType:"points",
graphType:"scatter",
color:"red"
}
]
})

}
}

/* ❌ KESİŞİM */
function findIntersections(){

let f1=func.value
let f2=func2.value

if(!f1 || !f2){
result.innerHTML="2 fonksiyon gir"
return
}

let pts=[]

for(let i=-50;i<=50;i+=0.1){
try{
let y1=math.evaluate(f1,{x:i})
let y2=math.evaluate(f2,{x:i})
if(Math.abs(y1-y2)<0.2){
pts.push([i,y1])
}
}catch{}
}

functionPlot({
target:"#plot",
width:plot.clientWidth,
height:400,
grid:true,
zoom:true,
pan:true,
data:[
{fn:f1},
{fn:f2},
{
points:pts,
fnType:"points",
graphType:"scatter",
color:"red"
}
]
})

result.innerHTML="Kesişim sayısı: "+pts.length
}

/* 📸 PNG aynı (seninki korunur) */
function downloadPNG(){

let svg=document.querySelector("#plot svg")

if(!svg){
alert("Önce grafiği çiz")
return
}

let serializer=new XMLSerializer()
let source=serializer.serializeToString(svg)

let img=new Image()

img.onload=function(){

let canvas=document.createElement("canvas")
canvas.width=800
canvas.height=500

let ctx=canvas.getContext("2d")

ctx.fillStyle="white"
ctx.fillRect(0,0,800,500)
ctx.drawImage(img,0,0)

let link=document.createElement("a")
link.download="grafik.png"
link.href=canvas.toDataURL()
link.click()

}

img.src="data:image/svg+xml;base64,"+btoa(source)
}

/* ⚡ PERFORMANCE */
function debounce(func,delay){
let t
return function(){
clearTimeout(t)
t=setTimeout(func,delay)
}
}

func.addEventListener("input",debounce(draw,200))
func2.addEventListener("input",debounce(draw,200))
func3.addEventListener("input",debounce(draw,200))

window.onload=()=>setTimeout(draw,100)

</script>

</body>
</html>
