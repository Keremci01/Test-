<!DOCTYPE html>

<html>
<head>
<meta charset="utf-8">
<title>Math Graph Tool</title>

<script src="https://cdn.jsdelivr.net/npm/function-plot/dist/function-plot.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.11.0/math.min.js"></script>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f6f9;
}

#hamburger{
font-size:28px;
position:fixed;
top:10px;
left:10px;
cursor:pointer;
background:white;
padding:8px 12px;
border-radius:6px;
z-index:1001;
}

#menu{
position:fixed;
left:0;
top:0;
width:230px;
height:100%;
background:#1f1f1f;
color:white;
padding:25px;
padding-top:70px;
display:none;
}

#menu button{
width:100%;
padding:12px;
margin:10px 0;
border:none;
background:#333;
color:white;
border-radius:6px;
cursor:pointer;
}

#content{
margin-left:60px;
padding:20px;
}

#plot{
margin-top:20px;
}

</style>

</head>

<body>

<div id="hamburger" onclick="toggleMenu()">☰</div>

<div id="menu">

<h3>Menü</h3>

<button onclick="modeFunction()">Fonksiyon Grafiği</button> <button onclick="modeDerivative()">Türev Grafiği</button> <button onclick="modeIntegral()">İntegral Alanı</button>

</div>

<div id="content">

<h2 id="title">Fonksiyon Grafiği</h2>

<input id="func" value="x^2">

<input id="a" type="number" placeholder="a" style="display:none">

<input id="b" type="number" placeholder="b" style="display:none">

<button onclick="draw()">Grafiği Çiz</button>

<div id="plot"></div>

</div>

<script>

let mode="function";

function toggleMenu(){

let m=document.getElementById("menu");

if(m.style.display==="block"){
m.style.display="none";
}else{
m.style.display="block";
}

}

function modeFunction(){

mode="function";

document.getElementById("title").innerHTML="Fonksiyon Grafiği";

document.getElementById("a").style.display="none";
document.getElementById("b").style.display="none";

toggleMenu();

}

function modeDerivative(){

mode="derivative";

document.getElementById("title").innerHTML="Türev Grafiği";

document.getElementById("a").style.display="none";
document.getElementById("b").style.display="none";

toggleMenu();

}

function modeIntegral(){

mode="integral";

document.getElementById("title").innerHTML="İntegral Alanı";

document.getElementById("a").style.display="inline";
document.getElementById("b").style.display="inline";

toggleMenu();

}

function draw(){

let f=document.getElementById("func").value;

if(mode==="function"){

functionPlot({
target:"#plot",
width:800,
height:500,
grid:true,
data:[
{fn:f}
]
});

}

if(mode==="derivative"){

let d=math.derivative(f,"x").toString();

functionPlot({
target:"#plot",
width:800,
height:500,
grid:true,
data:[
{fn:d}
]
});

}

if(mode==="integral"){

let a=parseFloat(document.getElementById("a").value);
let b=parseFloat(document.getElementById("b").value);

functionPlot({

target:"#plot",
width:800,
height:500,
grid:true,

annotations:[
{x:a,text:"a"},
{x:b,text:"b"}
],

data:[

{
fn:f
},

{
fn:f,
range:[a,b],
closed:true,
color:"red"
},

{
fn:`${a}`,
color:"black"
},

{
fn:`${b}`,
color:"black"
}

]

});

}

}

window.onload=draw;

</script>

</body>
</html>
