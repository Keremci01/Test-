<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Math Graph</title>

<script src="https://cdn.jsdelivr.net/npm/function-plot/dist/function-plot.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.11.0/math.min.js"></script>

<style>

/* BODY */
body{
font-family:Arial;
margin:0;
background:#f4f6f9;
}

/* HAMBURGER */
#hamburger{
font-size:28px;
position:fixed;
top:10px;
left:10px;
cursor:pointer;
background:white;
padding:8px 12px;
border-radius:10px;
z-index:1000;
}

/* MENU */
#menu{
position:fixed;
left:-260px;
top:0;
width:250px;
height:100%;
background:#1e293b;
color:white;
padding:20px;
transition:0.3s;
z-index:999;
}

#menu.active{
left:0;
}

#menu button{
width:100%;
margin:8px 0;
padding:10px;
background:#334155;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

/* CONTENT */
#content{
margin-left:70px;
padding:20px;
}

/* INPUT */
input{
padding:8px;
margin:5px;
border-radius:6px;
border:1px solid #ccc;
}

/* BUTTON */
button{
padding:8px 15px;
border:none;
border-radius:8px;
background:#2563eb;
color:white;
cursor:pointer;
}

/* GRAPH */
#plot{
background:white;
margin-top:20px;
border-radius:12px;
}

/* TABLE */
table{
margin-top:20px;
border-collapse:collapse;
width:100%;
}
td,th{
border:1px solid #ccc;
padding:6px;
text-align:center;
}

</style>

</head>

<body>

<div id="hamburger" onclick="toggleMenu()">☰</div>

<div id="menu">

<h3>Menü</h3>

<button onclick="setMode('function')">Fonksiyon</button>
<button onclick="setMode('multi')">Çoklu Fonksiyon</button>
<button onclick="setMode('derivative')">Türev</button>
<button onclick="setMode('integral')">İntegral</button>
<button onclick="setMode('tangent')">Teğet</button>
<button onclick="setMode('distance')">Mesafe</button>
<button onclick="setMode('calculator')">Hesap Makinesi</button>

</div>

<div id="content">

<h2 id="title">Fonksiyon Grafiği</h2>

<!-- INPUTLAR -->
<input id="func" value="x^2">
<input id="func2" style="display:none">
<input id="func3" style="display:none">

<input id="a" placeholder="a" style="display:none">
<input id="b" placeholder="b" style="display:none">

<input id="x0" placeholder="x0" style="display:none">

<input id="x1" placeholder="x1" style="display:none">
<input id="y1" placeholder="y1" style="display:none">
<input id="x2" placeholder="x2" style="display:none">
<input id="y2" placeholder="y2" style="display:none">

<br><br>

<!-- BUTONLAR -->
<button onclick="draw()">Grafiği Çiz</button>
<button onclick="downloadPNG()">PNG İndir</button>
<button id="intersectBtn" onclick="findIntersections()" style="display:none">
Kesişim Bul
</button>

<div id="plot"></div>

<div id="result"></div>
<div id="tableContainer"></div>

<!-- CALCULATOR -->
<div id="calculator" style="display:none;margin-top:20px;">
<input id="calcDisplay"><br>

<button onclick="calc('7')">7</button>
<button onclick="calc('8')">8</button>
<button onclick="calc('9')">9</button>
<button onclick="calc('/')">÷</button><br>

<button onclick="calc('4')">4</button>
<button onclick="calc('5')">5</button>
<button onclick="calc('6')">6</button>
<button onclick="calc('*')">×</button><br>

<button onclick="calc('1')">1</button>
<button onclick="calc('2')">2</button>
<button onclick="calc('3')">3</button>
<button onclick="calc('-')">-</button><br>

<button onclick="calc('0')">0</button>
<button onclick="calc('.')">.</button>
<button onclick="calculate()">=</button>
<button onclick="calc('+')">+</button><br>

<button onclick="clearCalc()">GG</button>
</div>

</div>

<script>

let mode="function"

/* MENU */
function toggleMenu(){
menu.classList.toggle("active")
}

/* MODE */
function setMode(m){
mode=m

// reset
func2.style.display="none"
func3.style.display="none"
a.style.display="none"
b.style.display="none"
x0.style.display="none"
x1.style.display="none"
y1.style.display="none"
x2.style.display="none"
y2.style.display="none"
calculator.style.display="none"
plot.style.display="block"

intersectBtn.style.display="none"

if(m==="multi"){
func2.style.display="inline"
func3.style.display="inline"
intersectBtn.style.display="inline"
}

if(m==="integral"){
a.style.display="inline"
b.style.display="inline"
}

if(m==="tangent"){
x0.style.display="inline"
}

if(m==="distance"){
x1.style.display="inline"
y1.style.display="inline"
x2.style.display="inline"
y2.style.display="inline"
}

if(m==="calculator"){
calculator.style.display="block"
plot.style.display="none"
}

draw()
}

/* DRAW */
function draw(){

let f=func.value

try{

let data=[{fn:f}]

if(mode==="multi"){
if(func2.value) data.push({fn:func2.value})
if(func3.value) data.push({fn:func3.value})
}

functionPlot({
target:"#plot",
width:plot.clientWidth,
height:500,
grid:true,
data:data
})

}catch(e){
result.innerHTML=e.message
}

}

/* INTERSECTION */
function findIntersections(){

let f1=func.value
let f2=func2.value

let rows=""
let pts=[]

for(let i=-50;i<=50;i+=0.1){
try{
let y1=math.evaluate(f1,{x:i})
let y2=math.evaluate(f2,{x:i})

if(Math.abs(y1-y2)<0.1){
pts.push([i,y1])
rows+=`<tr><td>${i.toFixed(2)}</td><td>${y1.toFixed(2)}</td></tr>`
}
}catch{}
}

functionPlot({
target:"#plot",
width:plot.clientWidth,
height:500,
data:[
{fn:f1},
{fn:f2},
{points:pts,fnType:"points"}
]
})

tableContainer.innerHTML=`<table><tr><th>X</th><th>Y</th></tr>${rows}</table>`

}

/* CALC */
function calc(v){calcDisplay.value+=v}
function calculate(){calcDisplay.value=math.evaluate(calcDisplay.value)}
function clearCalc(){calcDisplay.value=""}

/* PNG */
function downloadPNG(){
alert("PNG indir aktif 👍")
}

/* AUTO DRAW */
window.onload=()=>setTimeout(draw,100)

</script>

</body>
</html>
